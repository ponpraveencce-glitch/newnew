<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card-container">
        <header>
            <h1>Mini Project</h1>
            <p>Enter details to submit your project</p>
        </header>

        <form id="projectForm">
            <div class="input-group">
                <label for="username">User Name</label>
                <input type="text" id="username" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label for="projectTitle">Project Title</label>
                <input type="text" id="projectTitle" placeholder="Enter project title" required>
            </div>

            <button type="submit" id="submitBtn">Submit</button>
        </form>

        <div id="responseMessage" class="response-box hidden"></div>
    </div>

    <script>
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const projectTitle = document.getElementById('projectTitle').value;
            const responseDiv = document.getElementById('responseMessage');

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, projectTitle })
                });

                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response-box success';
                    responseDiv.innerText = data.message;
                } else {
                    responseDiv.className = 'response-box error';
                    responseDiv.innerText = data.error || 'Something went wrong!';
                }
            } catch (err) {
                responseDiv.className = 'response-box error';
                responseDiv.innerText = 'Backend connection error! Check server.';
            }

            responseDiv.classList.remove('hidden');
        });
    </script>
</body>
</html>
